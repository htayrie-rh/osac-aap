---
- name: Create a compute instance from a ComputeInstance
  hosts: localhost
  gather_facts: false

  vars:
    compute_instance: "{{ ansible_eda.event.payload }}"
    compute_instance_name: "{{ ansible_eda.event.payload.metadata.name }}"
    template_id: "{{ ansible_eda.event.payload.spec.templateID }}"
    template_parameters: {}
    tenant_storage_classes: "{{ ansible_eda.event.tenant_storage_classes | default([]) }}"

  pre_tasks:
    - name: Show EDA Event
      ansible.builtin.debug:
        var: ansible_eda.event.payload

    # Brings in variables:
    # tenant_target_namespace
    - name: Determine tenant target namespace
      ansible.builtin.include_role:
        name: osac.service.tenant_target_namespace

    - name: Fail if tenant storage classes not injected
      ansible.builtin.fail:
        msg: >-
          ComputeInstance '{{ compute_instance_name }}' has no tenant_storage_classes
          in extra_vars. The osac-operator CI controller should inject the resolved
          storageClasses list before triggering provisioning.
      when: tenant_storage_classes | length == 0

    - name: Set storage classes context for downstream roles
      ansible.builtin.set_fact:
        tenant_storage_class_storage_classes: "{{ tenant_storage_classes }}"
        tenant_storage_class_tenant_name: >-
          {{
            compute_instance.status.tenantReference.name
            if compute_instance.status is defined and compute_instance.status.tenantReference is defined
            else (compute_instance.metadata.annotations | default({})).get('osac.openshift.io/tenant', 'unknown')
          }}

  tasks:

    - name: Display compute instance information
      ansible.builtin.debug:
        msg:
          - "Compute instance name: {{ compute_instance_name }}"
          - "Tenant target namespace: {{ tenant_target_namespace }}"
          - "Template ID: {{ template_id }}"
          - "Template parameters: {{ template_parameters }}"

    - name: "Set the finalizer on the OSAC compute instance {{ compute_instance_name }}"
      ansible.builtin.include_role:
        name: osac.service.finalizer
      vars:
        finalizer_state: present
        finalizer_name: "{{ compute_instance_osac_finalizer }}"
        finalizer_target:
          api_version: osac.openshift.io/v1alpha1
          kind: ComputeInstance
          namespace: "{{ compute_instance.metadata.namespace }}"
          name: "{{ compute_instance_name }}"

    - name: Call the selected compute instance template
      ansible.builtin.include_role:
        name: "{{ template_id }}"
        tasks_from: "create"
